name: homebrew-update

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 08:00 CET / 09:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Extract package lists from nix
        run: |
          for HOST in "NL-F2T6KVCQ3G" "Pieters-MacBook-Pro"; do
            nix eval --json ".#darwinConfigurations.\"${HOST}\".config.homebrew.casks" > /tmp/${HOST}-casks.json
            nix eval --json ".#darwinConfigurations.\"${HOST}\".config.homebrew.brews" > /tmp/${HOST}-brews.json
          done

      - name: Check Homebrew versions and update lock files
        id: check
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          HOSTS = ["NL-F2T6KVCQ3G", "Pieters-MacBook-Pro"]

          def fetch_version(name, pkg_type):
              try:
                  if pkg_type == "cask":
                      url = f"https://formulae.brew.sh/api/cask/{name}.json"
                  else:
                      url = f"https://formulae.brew.sh/api/formula/{name}.json"
                  req = urllib.request.Request(url, headers={"User-Agent": "homebrew-lock-checker/1.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                  return data["version"] if pkg_type == "cask" else data["versions"]["stable"]
              except Exception:
                  return "unknown"

          def parse_brew_name(brew):
              return brew["name"] if isinstance(brew, dict) else brew

          all_changes = {}

          for host in HOSTS:
              with open(f"/tmp/{host}-casks.json") as f:
                  casks = json.load(f)
              with open(f"/tmp/{host}-brews.json") as f:
                  brews = [parse_brew_name(b) for b in json.load(f)]

              new_lock = {
                  "brews": {b: fetch_version(b, "formula") for b in sorted(brews)},
                  "casks": {c: fetch_version(c, "cask") for c in sorted(casks)},
              }

              lock_path = f"homebrew-locks/{host}.json"
              changes = []

              if os.path.exists(lock_path):
                  with open(lock_path) as f:
                      old_lock = json.load(f)
                  for section in ["casks", "brews"]:
                      for name, new_ver in new_lock[section].items():
                          old_ver = old_lock.get(section, {}).get(name)
                          if old_ver is None:
                              changes.append(f"➕ {name} {new_ver} ({section[:-1]})")
                          elif old_ver != new_ver and new_ver != "unknown":
                              changes.append(f"⬆️ {name}: {old_ver} → {new_ver}")
                      for name in old_lock.get(section, {}):
                          if name not in new_lock[section]:
                              changes.append(f"➖ {name} ({section[:-1]})")

              with open(lock_path, "w") as f:
                  json.dump(new_lock, f, indent=2, sort_keys=True)
                  f.write("\n")

              if changes:
                  all_changes[host] = changes

          if all_changes:
              lines = []
              for host, host_changes in all_changes.items():
                  lines.append(f"### {host}")
                  lines.extend(host_changes)
              body = "\n".join(lines)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("changed=true\n")
                  f.write(f"content<<EOF\n{body}\nEOF\n")
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("changed=false\n")
          EOF

      - name: Create or update pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: homebrew-lock-update
          commit-message: "homebrew: update cask and formula versions"
          title: "homebrew: update cask and formula versions"
          body: |
            Automated Homebrew cask and formula version update.

            ### 📦 Version changes

            ${{ steps.check.outputs.content }}

            ---
            *Generated by [homebrew-update](/.github/workflows/homebrew-updates.yml)*
          labels: homebrew-updates
