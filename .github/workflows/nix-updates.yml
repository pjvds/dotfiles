name: nix-flake-update

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 08:00 CET / 09:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Capture derivation before update
        id: before
        run: |
          DRV=$(nix eval --raw '.#darwinConfigurations."NL-F2T6KVCQ3G".system.drvPath')
          echo "drv=$DRV" >> "$GITHUB_OUTPUT"

      - name: Update flake inputs
        run: nix flake update

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture derivation after update
        if: steps.changed.outputs.changed == 'true'
        id: after
        run: |
          if DRV=$(nix eval --raw '.#darwinConfigurations."NL-F2T6KVCQ3G".system.drvPath' 2>/tmp/nix-eval-error.txt); then
            echo "drv=$DRV" >> "$GITHUB_OUTPUT"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            ERROR_MSG=$(grep 'error:' /tmp/nix-eval-error.txt | tail -1 | sed 's/^[[:space:]]*//')
            echo "error_msg=$ERROR_MSG" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff derivations
        if: steps.changed.outputs.changed == 'true'
        id: diff
        run: |
          if [ "${{ steps.after.outputs.ok }}" != "true" ]; then
            DIFF="⚠️ **Evaluation failed after update** — manual intervention required.

\`${{ steps.after.outputs.error_msg }}\`"
          else
            # Resolve drv paths to their immediate output references (1 level deep)
            # This limits the diff to top-level packages only, not the full transitive closure
            BEFORE_REFS=$(nix-store --query --references "${{ steps.before.outputs.drv }}" 2>/dev/null | tr '\n' ' ')
            AFTER_REFS=$(nix-store --query --references "${{ steps.after.outputs.drv }}" 2>/dev/null | tr '\n' ' ')

            DIFF=$(nix store diff-closures $BEFORE_REFS $AFTER_REFS 2>/dev/null \
              | grep -v '^$' \
              | sed 's/ε/→ (removed)/g' \
              | sed 's/, ε/→ (removed)/g' \
              || true)

            if [ -z "$DIFF" ]; then
              DIFF="_No package changes detected._"
            fi
          fi
          { echo 'content<<EOF'; echo "$DIFF"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - name: Extract Homebrew package lists from nix
        if: steps.changed.outputs.changed == 'true' && steps.after.outputs.ok == 'true'
        run: |
          for HOST in "NL-F2T6KVCQ3G" "Pieters-MacBook-Pro"; do
            nix eval --json ".#darwinConfigurations.\"${HOST}\".config.homebrew.casks" > /tmp/${HOST}-casks.json
            nix eval --json ".#darwinConfigurations.\"${HOST}\".config.homebrew.brews" > /tmp/${HOST}-brews.json
          done

      - name: Capture Homebrew versions
        if: steps.changed.outputs.changed == 'true' && steps.after.outputs.ok == 'true'
        id: homebrew
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, glob

          def fetch_version(name, pkg_type):
              try:
                  url = f"https://formulae.brew.sh/api/{'cask' if pkg_type == 'cask' else 'formula'}/{name}.json"
                  req = urllib.request.Request(url, headers={"User-Agent": "homebrew-lock-checker/1.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                  return data["version"] if pkg_type == "cask" else data["versions"]["stable"]
              except Exception:
                  return "unknown"

          def pkg_name(pkg):
              return pkg["name"] if isinstance(pkg, dict) else pkg

          HOST_MAP = {
              "NL-F2T6KVCQ3G": "workstation",
              "Pieters-MacBook-Pro": "homelab",
          }

          lines = []
          for hostname, host_dir in HOST_MAP.items():
              lock_path = f"hosts/{host_dir}/homebrew.lock.json"
              casks_json = f"/tmp/{hostname}-casks.json"
              brews_json = f"/tmp/{hostname}-brews.json"

              if not (os.path.exists(lock_path) and os.path.exists(casks_json)):
                  continue

              with open(casks_json) as f:
                  casks = [pkg_name(c) for c in json.load(f)]
              with open(brews_json) as f:
                  brews = [pkg_name(b) for b in json.load(f)]

              new_versions = {
                  "brews": {b: fetch_version(b, "formula") for b in sorted(brews)},
                  "casks": {c: fetch_version(c, "cask") for c in sorted(casks)},
              }

              with open(lock_path) as f:
                  old_versions = json.load(f)

              changes = []
              for section in ["casks", "brews"]:
                  for name, new_ver in new_versions[section].items():
                      old_ver = old_versions.get(section, {}).get(name)
                      if old_ver is None:
                          changes.append(f"➕ {name} {new_ver}")
                      elif old_ver != new_ver and new_ver != "unknown":
                          changes.append(f"⬆️ {name}: {old_ver} → {new_ver}")
                  for name in old_versions.get(section, {}):
                      if name not in new_versions[section]:
                          changes.append(f"➖ {name}")

              # Write updated lock file (only declared packages)
              with open(lock_path, "w") as f:
                  json.dump(new_versions, f, indent=2, sort_keys=True)
                  f.write("\n")

              if changes:
                  lines.append(f"**{host_dir}**")
                  lines.extend(changes)

          body = "\n".join(lines) if lines else "_No Homebrew version changes detected._"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"content<<EOF\n{body}\nEOF\n")
          EOF

      - name: Create or update pull request
        if: steps.changed.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: nix-flake-update
          commit-message: "nix: update flake inputs"
          title: "nix: update flake inputs"
          body: |
            Automated flake input update.

            ### 📦 Nix package changes

            ${{ steps.diff.outputs.content }}

            ### 🍺 Homebrew version changes

            ${{ steps.homebrew.outputs.content || '_Skipped — flake evaluation failed._' }}

            ---
            *Generated by [nix-flake-update](/.github/workflows/nix-updates.yml)*
          labels: nix-updates

      - name: Comment on updated pull request
        if: steps.pr.outputs.pull-request-operation == 'updated'
        run: |
          gh pr comment ${{ steps.pr.outputs.pull-request-number }} --body "$(cat <<'EOF'
          🔄 PR description updated with latest changes.

          ### 📦 Nix package changes

          ${{ steps.diff.outputs.content }}

          ### 🍺 Homebrew version changes

          ${{ steps.homebrew.outputs.content || '_Skipped — flake evaluation failed._' }}
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

