name: nix-flake-update

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 08:00 CET / 09:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update flake inputs
        run: nix flake update

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: nix-flake-update
          commit-message: "nix: update flake inputs"
          title: "nix: update flake inputs"
          body: |
            Automated flake input update.

            A derivation diff will be posted as a comment by the [nix-diff](/.github/workflows/nix-diff.yml) workflow.

            ---
            *Generated by [nix-flake-update](/.github/workflows/nix-updates.yml)*
          labels: nix-updates

