name: nix-flake-update

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 08:00 CET / 09:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Capture derivation before update
        id: before
        run: |
          DRV=$(nix eval --raw '.#darwinConfigurations."NL-F2T6KVCQ3G".system.drvPath')
          echo "drv=$DRV" >> "$GITHUB_OUTPUT"

      - name: Update flake inputs
        run: nix flake update

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture derivation after update
        if: steps.changed.outputs.changed == 'true'
        id: after
        run: |
          DRV=$(nix eval --raw '.#darwinConfigurations."NL-F2T6KVCQ3G".system.drvPath')
          echo "drv=$DRV" >> "$GITHUB_OUTPUT"

      - name: Diff derivations
        if: steps.changed.outputs.changed == 'true'
        id: diff
        run: |
          RAW=$(nix run nixpkgs#dix -- \
            "${{ steps.before.outputs.drv }}" \
            "${{ steps.after.outputs.drv }}" \
            2>/dev/null || true)
          DIFF=$(echo "$RAW" \
            | grep -v '^<<<' \
            | grep -v '^>>>' \
            | sed 's/\.drv//g' \
            | sed 's/, <others>//g' \
            | sed 's/\[U\.\]/⬆️ /g' \
            | sed 's/\[A\.\]/➕ /g' \
            | sed 's/\[R\.\]/➖ /g' \
            | sed 's/\[D\.\]/🔄 /g' \
            | sed 's/ -> / → /g' \
            | sed 's/^CHANGED$/### ⬆️ Changed/' \
            | sed 's/^ADDED$/### ➕ Added/' \
            | sed 's/^REMOVED$/### ➖ Removed/' \
            || true)
          if [ -z "$DIFF" ]; then
            DIFF="_No package changes detected._"
          fi
          { echo 'content<<EOF'; echo "$DIFF"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: nix-flake-update
          commit-message: "nix: update flake inputs"
          title: "nix: update flake inputs"
          body: |
            Automated flake input update.

            <details>
            <summary>📦 Package changes</summary>

            ```
            ${{ steps.diff.outputs.content }}
            ```

            </details>

            ---
            *Generated by [nix-flake-update](/.github/workflows/nix-updates.yml)*
          labels: nix-updates

