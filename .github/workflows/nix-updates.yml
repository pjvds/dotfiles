name: nix-flake-update

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 08:00 CET / 09:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Capture derivation before update
        id: before
        run: |
          DRV=$(nix eval --raw '.#darwinConfigurations."NL-F2T6KVCQ3G".system.drvPath')
          echo "drv=$DRV" >> "$GITHUB_OUTPUT"

      - name: Update flake inputs
        run: nix flake update

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture derivation after update
        if: steps.changed.outputs.changed == 'true'
        id: after
        run: |
          DRV=$(nix eval --raw '.#darwinConfigurations."NL-F2T6KVCQ3G".system.drvPath')
          echo "drv=$DRV" >> "$GITHUB_OUTPUT"

      - name: Diff derivations
        if: steps.changed.outputs.changed == 'true'
        id: diff
        run: |
          # Resolve drv paths to their immediate output references (1 level deep)
          # This limits the diff to top-level packages only, not the full transitive closure
          BEFORE_REFS=$(nix-store --query --references "${{ steps.before.outputs.drv }}" 2>/dev/null | tr '\n' ' ')
          AFTER_REFS=$(nix-store --query --references "${{ steps.after.outputs.drv }}" 2>/dev/null | tr '\n' ' ')

          DIFF=$(nix store diff-closures $BEFORE_REFS $AFTER_REFS 2>/dev/null \
            | grep -v '^$' \
            | sed 's/ε/→ (removed)/g' \
            | sed 's/, ε/→ (removed)/g' \
            || true)

          if [ -z "$DIFF" ]; then
            DIFF="_No package changes detected._"
          fi
          { echo 'content<<EOF'; echo "$DIFF"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - name: Set homebrew info
        id: homebrew
        run: |
          echo 'content<<EOF' >> "$GITHUB_OUTPUT"
          echo "_Homebrew lock files are managed locally by \`update-system.sh\` and will be synced when the nix configuration is deployed._" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.changed.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: nix-flake-update
          commit-message: "nix: update flake inputs"
          title: "nix: update flake inputs"
          body: |
            Automated flake input update.

            ### 📦 Nix package changes

            ${{ steps.diff.outputs.content }}

            ### 🍺 Homebrew version changes

            ${{ steps.homebrew.outputs.content }}

            ---
            *Generated by [nix-flake-update](/.github/workflows/nix-updates.yml)*
          labels: nix-updates

      - name: Comment on updated pull request
        if: steps.pr.outputs.pull-request-operation == 'updated'
        run: |
          gh pr comment ${{ steps.pr.outputs.pull-request-number }} --body "$(cat <<'EOF'
          🔄 PR description updated with latest changes.

          ### 📦 Nix package changes

          ${{ steps.diff.outputs.content }}

          ### 🍺 Homebrew version changes

          ${{ steps.homebrew.outputs.content }}
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

