# vim:fileencoding=utf-8:ft=conf

Cursor # ─── ─────────────────────────────────────
cursor_shape              block
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0
cursor_trail              1

# ─── Font ─────────────────────────────────────────────────────────────────────
# Font is managed by the BEGIN_KITTY_FONTS block at the bottom of this file.
font_size            14
macos_thicken_font   0

Colors # ─── ───────────
# Theme loaded from state dir; toggled by the `theme` CLI.
# BEGIN_KITTY_THEME
include ~/.local/state/theme/kitty-theme.conf
# END_KITTY_THEME

# Override selection colors to match nvim (pale goldenrod, RGB 254 248 143)
selection_foreground #000000
selection_background #FEF88F

dynamic_background_opacity no

Scrollback # ─── 
scrollback_lines 20000
scrollback_pager less +G -R

# ─── Window ───────────────────────────────────────────────────────────────────
confirm_os_window_close  0
remember_window_size     yes
initial_window_width     640
initial_window_height    400
window_border_width      1
window_margin_width      1
window_padding_width     5
draw_minimal_borders     yes
inactive_text_alpha      1.0
hide_window_decorations  titlebar-only

Layouts # ─── ────────
enabled_layouts fat:bias=78;full_size=1;mirrored=false,splits:split_axis=horizontal

# ─── Tabs ─────────────────────────────────────────────────────────────────────
tab_bar_edge bottom
tab_separator " ┇"

# ─── Mouse ────────────────────────────────────────────────────────────────────
mouse_hide_wait             3.0
focus_follows_mouse         no
click_interval              0.5
wheel_scroll_multiplier     1.0
select_by_word_characters   :@-./_~?&=%+#
copy_on_select              yes
url_style                   curly
open_url_modifiers          ctrl+shift
open_url_with               default
rectangle_select_modifiers  ctrl+alt

Bell # ─── ───────────────────────────────────────────────────────────────
visual_bell_duration 0.0
enable_audio_bell    no

Performance # ─── ─────────────────────────────────────────────────────
repaint_delay   10
input_delay     3
sync_to_monitor yes

Misc # ─── ─────────────────────────────────────────────────
shell                            .
allow_remote_control             yes
term                             xterm-kitty
box_drawing_scale                0.001, 1, 1.5, 2
macos_option_as_alt              yes
macos_quit_when_last_window_closed yes
x11_bell_volume                  80

# ─── Key bindings ─────────────────────────────────────────────────────────────
kitty_mod ctrl+shift

# Clipboard
map ctrl+shift+v        paste_from_clipboard
map super+v             paste_from_clipboard
map ctrl+shift+s        paste_from_selection
map super+c             copy_to_clipboard
map ctrl+shift+c        copy_to_clipboard
map shift+insert        paste_from_selection
map ctrl+shift+o        pass_selection_to_program

# Scrolling
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+k         scroll_line_up
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+h         show_scrollback

# Window management
map super+h             hide_window
map ctrl+shift+enter    new_window
map ctrl+shift+n        new_os_window
map ctrl+shift+w        close_window
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+f        move_window_forward
map ctrl+shift+b        move_window_backward
map ctrl+shift+`        move_window_to_top
map ctrl+shift+1        first_window
map ctrl+shift+2        second_window
map ctrl+shift+3        third_window
map ctrl+shift+4        fourth_window
map ctrl+shift+5        fifth_window
map ctrl+shift+6        sixth_window
map ctrl+shift+7        seventh_window
map ctrl+shift+8        eighth_window
map ctrl+shift+9        ninth_window
map ctrl+shift+0        tenth_window

# Tab management
map super+§             next_tab
map ctrl+shift+q        close_tab
map ctrl+shift+l        next_layout
map super+shift+l       next_layout
map super+]             next_layout
map ctrl+shift+.        move_tab_forward
map ctrl+shift+,        move_tab_backward

# Font size
map super+equal         increase_font_size
map super+minus         decrease_font_size
map ctrl+shift+equal    increase_font_size
map ctrl+shift+minus    decrease_font_size
map ctrl+shift+backspace restore_font_size

# Misc
map ctrl+shift+f11      toggle_fullscreen
map ctrl+shift+u        input_unicode_character
map ctrl+shift+e        run_simple_kitten text url_hints

map kitty_mod+'              set_background_opacity +0.05
map kitty_mod+;              set_background_opacity -0.05
map kitty_mod+left_bracket   set_background_opacity 0.9
map kitty_mod+right_bracket  set_background_opacity 1

# Splits
map f4 launch --location=split
map f5 launch --location=hsplit
map f6 launch --location=vsplit
map super+shift+enter launch --location=hsplit

# Window movement
map command+shift+k move_window up
map command+shift+h move_window left
map command+shift+l move_window right
map command+shift+j move_window down

# Window focus
map command+k neighboring_window up
map command+h neighboring_window left
map command+l neighboring_window right
map command+j neighboring_window down

# BEGIN_KITTY_FONTS
font_family      family="PT Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
